<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jawaban untuk Apipp 🌷</title>
</head>
<body>

<h2>Semua Jawaban 💌</h2>
<button onclick="loadAnswers()">Load Jawaban</button>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDuGQHTMwKHO7bT5Q37ux-U5EZKufAOYcM",
  authDomain: "apip-7855d.firebaseapp.com",
  projectId: "apip-7855d",
  storageBucket: "apip-7855d.firebasestorage.app",
  messagingSenderId: "902075180693",
  appId: "1:902075180693:web:fd9fbf7074de5e289cdd9c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadAnswers = async function(){
  const querySnapshot = await getDocs(collection(db,"jawaban"));
  const list = document.getElementById("list");
  list.innerHTML="";

  querySnapshot.forEach((doc)=>{
    const data = doc.data();
    list.innerHTML+=`
      <p><b>${data.nama}</b>: ${data.isi}</p>
      <hr>
    `;
  });
}
</script>

</body>
</html>
